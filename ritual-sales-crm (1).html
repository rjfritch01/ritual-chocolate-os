<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritual Chocolate — Sales CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cacao:#2a1506;--cacao-mid:#5c2d0a;--cacao-light:#8b4513;--gold:#c9933a;
  --cream:#f7ede0;--cream-dark:#e8d5be;--parchment:#f2e6d4;--ink:#1a0e06;
  --text-primary:#2a1506;--text-secondary:#6b4020;--text-muted:#9e7455;
  --surface:#fdf6ee;--surface-raised:#fff9f2;
  --border:rgba(90,45,15,0.15);--border-strong:rgba(90,45,15,0.3);
  --green-bg:#1a3320;--green-text:#6dbf7a;
  --amber-bg:#3a2a06;--amber-text:#d4a830;
  --red-bg:#3a1010;--red-text:#d46060;
  --blue-bg:#0e2038;--blue-text:#60a8d4;
  --purple-bg:#1e1040;--purple-text:#9a70d4;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--text-primary);min-height:100vh;
  background-image:radial-gradient(ellipse at 80% 0%,rgba(139,69,19,.07) 0%,transparent 55%);}
.shell{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:var(--cacao);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.sidebar::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;}
.sb-head{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);position:relative;z-index:1;}
.logo{width:36px;height:36px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-family:'Playfair Display',serif;font-size:18px;color:var(--cacao);font-weight:600;}
.sb-title{font-family:'Playfair Display',serif;font-size:14px;color:var(--cream);font-weight:500;line-height:1.3;}
.sb-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px;font-family:'DM Mono',monospace;}
.nav-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.08);position:relative;z-index:1;}
.nav-tab{flex:1;padding:10px 4px;text-align:center;font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.3px;color:rgba(255,255,255,.3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;}
.nav-tab:hover{color:rgba(255,255,255,.6);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.filter-section{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.08);position:relative;z-index:1;}
.filter-label{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:'DM Mono',monospace;}
.filter-btn{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:6px;cursor:pointer;transition:all .15s;margin-bottom:2px;position:relative;}
.filter-btn:hover{background:rgba(255,255,255,.06);}
.filter-btn.active{background:rgba(201,147,58,.14);}
.filter-btn.active::before{content:'';position:absolute;left:0;top:3px;bottom:3px;width:2px;background:var(--gold);border-radius:0 2px 2px 0;}
.filt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.filt-name{font-size:11px;color:rgba(255,255,255,.5);}
.filter-btn.active .filt-name{color:rgba(255,255,255,.9);}
.filt-count{font-size:9px;color:rgba(255,255,255,.25);margin-left:auto;font-family:'DM Mono',monospace;}
.pipeline-section{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.08);position:relative;z-index:1;}
.pipeline-label{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:'DM Mono',monospace;}
.pipeline-stat{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.ps-label{font-size:10px;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace;}
.ps-val{font-size:11px;color:rgba(255,255,255,.7);font-family:'DM Mono',monospace;font-weight:500;}
.mini-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:4px;}
.mini-fill{height:100%;background:var(--gold);border-radius:2px;}
.aging-section{padding:12px 18px;flex:1;overflow-y:auto;position:relative;z-index:1;}
.aging-section::-webkit-scrollbar{width:3px;}
.aging-section::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.aging-label{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:'DM Mono',monospace;}
.aging-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.aging-item:last-child{border-bottom:none;}
.aging-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.aging-name{font-size:10px;color:rgba(255,255,255,.55);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.aging-days{font-size:9px;font-family:'DM Mono',monospace;padding:1px 5px;border-radius:4px;}
.aging-red{background:rgba(212,96,96,.2);color:#d46060;}
.aging-amber{background:rgba(212,168,48,.15);color:#d4a830;}

/* MAIN */
.main-split{flex:1;display:flex;overflow:hidden;}
.list-pane{width:380px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border);background:var(--surface);}
.list-pane::-webkit-scrollbar{width:4px;}
.list-pane::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px;}
.detail-pane{flex:1;overflow-y:auto;background:var(--surface-raised);}
.detail-pane::-webkit-scrollbar{width:5px;}
.detail-pane::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}

/* LIST PANE */
.list-head{padding:14px 16px 12px;border-bottom:1px solid var(--border);background:var(--surface-raised);position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;}
.list-search{flex:1;border:1px solid var(--border-strong);border-radius:7px;padding:6px 10px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text-primary);background:white;outline:none;}
.list-search::placeholder{color:var(--text-muted);}
.list-search:focus{border-color:var(--cacao-light);}
.list-count{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap;}
.contact-card{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.contact-card:hover{background:rgba(139,69,19,.03);}
.contact-card.selected{background:rgba(201,147,58,.07);border-left:2px solid var(--gold);}
.cc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;}
.cc-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;font-family:'Playfair Display',serif;flex-shrink:0;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-size:13px;font-weight:500;color:var(--text-primary);}
.cc-company{font-size:11px;color:var(--text-muted);margin-top:1px;}
.cc-right{text-align:right;flex-shrink:0;}
.cc-ltv{font-size:13px;font-weight:500;color:var(--cacao-mid);font-family:'Playfair Display',serif;}
.cc-last{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:1px;}
.cc-tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:9px;font-family:'DM Mono',monospace;}
.tag-channel{background:var(--blue-bg);color:var(--blue-text);}
.tag-wholesale{background:var(--green-bg);color:var(--green-text);}
.tag-affiliate{background:var(--purple-bg);color:var(--purple-text);}
.tag-shopify{background:var(--amber-bg);color:var(--amber-text);}
.tag-distributor{background:#1a2a3a;color:#6090c4;}
.tag-cafe{background:#2a1a0a;color:#c47840;}
.aging-flag{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:4px;font-size:9px;font-family:'DM Mono',monospace;}
.flag-red{background:rgba(212,96,96,.15);color:#d46060;}
.flag-amber{background:rgba(212,168,48,.12);color:#d4a830;}
.flag-green{background:rgba(109,191,122,.1);color:#6dbf7a;}

/* DETAIL PANE */
.dp-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);background:var(--surface-raised);}
.dp-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;}
.dp-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;font-family:'Playfair Display',serif;flex-shrink:0;}
.dp-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;color:var(--ink);}
.dp-company{font-size:13px;color:var(--text-secondary);margin-top:2px;}
.dp-contact-row{font-size:12px;color:var(--text-muted);margin-top:3px;font-family:'DM Mono',monospace;}
.dp-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.dp-actions{display:flex;gap:6px;margin-top:12px;}
.btn{padding:7px 15px;border-radius:8px;border:1.5px solid var(--border-strong);background:white;color:var(--text-primary);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .2s;}
.btn:hover{background:var(--cream-dark);}
.btn-primary{background:var(--cacao-light);color:white;border-color:var(--cacao-light);}
.btn-primary:hover{background:var(--cacao-mid);}
.btn-sm{padding:4px 10px;font-size:10px;}
.dp-body{padding:20px 24px;}
.dp-kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:20px;}
.kpi-card{background:var(--surface-raised);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.kpi-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-family:'DM Mono',monospace;margin-bottom:3px;}
.kpi-val{font-size:18px;font-weight:500;color:var(--ink);font-family:'Playfair Display',serif;line-height:1;}
.kpi-sub{font-size:10px;color:var(--text-muted);margin-top:2px;}
.section-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:var(--ink);margin-bottom:11px;}
.card{background:var(--surface-raised);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:16px;}
.card-head{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:500;color:var(--text-primary);}
.card-meta{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;}
/* orders table */
.order-row{display:grid;grid-template-columns:90px 1fr 80px 80px 80px;gap:0;padding:10px 16px;border-bottom:1px solid var(--border);align-items:center;}
.order-row:last-child{border-bottom:none;}
.order-row:hover{background:rgba(139,69,19,.025);}
.order-row.col-head-row{background:rgba(242,230,212,.5);}
.ord-date{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted);}
.ord-items{font-size:12px;color:var(--text-primary);line-height:1.4;}
.ord-items small{font-size:10px;color:var(--text-muted);}
.ord-total{font-size:12px;font-family:'DM Mono',monospace;color:var(--cacao-mid);font-weight:500;text-align:right;}
.ord-status{text-align:right;}
.ord-ch{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;text-align:right;}
.order-pill{padding:2px 7px;border-radius:5px;font-size:9px;font-family:'DM Mono',monospace;display:inline-block;}
.op-delivered{background:var(--green-bg);color:var(--green-text);}
.op-pending{background:var(--amber-bg);color:var(--amber-text);}
.op-processing{background:var(--blue-bg);color:var(--blue-text);}
/* top products */
.top-prod-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);}
.top-prod-row:last-child{border-bottom:none;}
.tp-rank{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted);width:18px;flex-shrink:0;}
.tp-name{font-size:12px;color:var(--text-primary);flex:1;}
.tp-bar-wrap{width:80px;}
.tp-bar-track{height:4px;background:var(--cream-dark);border-radius:2px;overflow:hidden;}
.tp-bar-fill{height:100%;background:var(--cacao-light);border-radius:2px;}
.tp-units{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted);width:50px;text-align:right;}
.tp-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--cacao-mid);font-weight:500;width:55px;text-align:right;}
/* notes */
.note-entry{padding:10px 16px;border-bottom:1px solid var(--border);}
.note-entry:last-child{border-bottom:none;}
.note-meta{display:flex;gap:6px;align-items:center;margin-bottom:3px;}
.note-author{font-size:11px;font-weight:500;color:var(--text-primary);}
.note-time{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.note-text{font-size:12px;color:var(--text-secondary);line-height:1.5;}
.note-type{padding:1px 6px;border-radius:4px;font-size:9px;font-family:'DM Mono',monospace;}
.nt-call{background:var(--blue-bg);color:var(--blue-text);}
.nt-email{background:var(--green-bg);color:var(--green-text);}
.nt-meeting{background:var(--purple-bg);color:var(--purple-text);}
.nt-order{background:var(--amber-bg);color:var(--amber-text);}
.nt-note{background:rgba(50,30,10,.4);color:rgba(220,180,130,.8);}
.compose-row{padding:11px 16px;border-top:1px solid var(--border);display:flex;gap:7px;}
.compose-input{flex:1;border:1px solid var(--border-strong);border-radius:7px;padding:7px 10px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text-primary);background:white;outline:none;}
.compose-input:focus{border-color:var(--cacao-light);}
.compose-input::placeholder{color:var(--text-muted);}
/* commission */
.comm-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);}
.comm-row:last-child{border-bottom:none;}
.comm-label{font-size:12px;color:var(--text-primary);flex:1;}
.comm-pct{font-size:12px;font-family:'DM Mono',monospace;color:var(--text-muted);}
.comm-earned{font-size:12px;font-family:'DM Mono',monospace;color:var(--cacao-mid);font-weight:500;width:70px;text-align:right;}
/* empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:48px;text-align:center;}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4;}
.empty-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--text-muted);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--text-muted);}
/* dashboard view */
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:22px 24px;}
.dash-kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:22px 24px 0;}
.pipeline-col{background:var(--surface-raised);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.pipeline-col-head{padding:13px 16px 11px;border-bottom:1px solid var(--border);}
.pipeline-col-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:500;}
.pipeline-item{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.pipeline-item:hover{background:rgba(139,69,19,.03);}
.pipeline-item:last-child{border-bottom:none;}
.pi-name{font-size:12px;font-weight:500;color:var(--text-primary);}
.pi-company{font-size:11px;color:var(--text-muted);}
.pi-val{font-size:12px;font-family:'DM Mono',monospace;color:var(--cacao-mid);font-weight:500;}
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-head">
    <div class="logo">R</div>
    <div class="sb-title">Ritual Chocolate<br>Sales CRM</div>
    <div class="sb-sub">Relationships &amp; Sales</div>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" id="tab-contacts" onclick="switchTab('contacts')">Contacts</div>
    <div class="nav-tab" id="tab-dashboard" onclick="switchTab('dashboard')">Pipeline</div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Channel</div>
    <div id="channelFilters"></div>
  </div>

  <div class="pipeline-section">
    <div class="pipeline-label">This Month</div>
    <div class="pipeline-stat"><span class="ps-label">Revenue</span><span class="ps-val">$38,420</span></div>
    <div class="pipeline-stat"><span class="ps-label">Orders</span><span class="ps-val">47</span></div>
    <div class="pipeline-stat"><span class="ps-label">New accounts</span><span class="ps-val">3</span></div>
    <div class="mini-bar"><div class="mini-fill" style="width:64%"></div></div>
    <div style="font-size:9px;color:rgba(255,255,255,.25);font-family:'DM Mono',monospace;margin-top:3px;">64% of $60k target</div>
  </div>

  <div class="aging-section">
    <div class="aging-label">⚠ Needs Attention</div>
    <div id="agingList"></div>
  </div>
</div>

<!-- MAIN: split list + detail -->
<div class="main-split" id="mainSplit">

  <div class="list-pane" id="listPane">
    <div class="list-head">
      <input class="list-search" id="listSearch" placeholder="Search contacts…" oninput="renderList()">
      <div class="list-count" id="listCount"></div>
    </div>
    <div id="contactList"></div>
  </div>

  <div class="detail-pane" id="detailPane">
    <div class="empty-state">
      <div class="empty-icon">🍫</div>
      <div class="empty-title">Select a contact</div>
      <div class="empty-sub">Click any name to view their full profile, order history, and notes</div>
    </div>
  </div>

</div>

// state
let currentTab='contacts';
let currentChannel='all';
let selectedContact=null;

// inject channel counts
CHANNELS.forEach(ch=>{ch.count=ch.id==='all'?CONTACTS.length:CONTACTS.filter(c=>c.channel===ch.id).length;});

function daysSinceColor(d){if(d>60)return'flag-red';if(d>30)return'flag-amber';return'flag-green';}
function daysSinceText(d){if(d===0)return'Today';if(d===1)return'Yesterday';return`${d}d ago`;}
function channelTag(ch){return`<span class="tag tag-${ch}">${CHANNELS.find(c=>c.id===ch)?.name||ch}</span>`;}
function fmtMoney(n){return'$'+n.toLocaleString();}

function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='contacts'){
    document.getElementById('listPane').style.display='';
    renderList();renderDetail();
  } else {
    document.getElementById('listPane').style.display='none';
    renderDashboard();
  }
}

function renderSidebar(){
  document.getElementById('channelFilters').innerHTML=CHANNELS.map(ch=>`
    <div class="filter-btn${currentChannel===ch.id?' active':''}" onclick="setChannel('${ch.id}')">
      <div class="filt-dot" style="background:${ch.color}"></div>
      <span class="filt-name">${ch.name}</span>
      <span class="filt-count">${ch.count}</span>
    </div>`).join('');

  const atRisk=CONTACTS.filter(c=>c.daysSince>30&&c.status!=='churned');
  const churned=CONTACTS.filter(c=>c.status==='churned');
  document.getElementById('agingList').innerHTML=[...atRisk,...churned].map(c=>`
    <div class="aging-item" onclick="selectContact('${c.id}');switchTab('contacts')">
      <div class="aging-dot" style="background:${c.daysSince>60?'#d46060':'#d4a830'}"></div>
      <div class="aging-name">${c.company}</div>
      <div class="aging-days ${c.daysSince>60?'aging-red':'aging-amber'}">${c.daysSince}d</div>
    </div>`).join('');
}

function setChannel(ch){currentChannel=ch;renderSidebar();renderList();}

function filteredContacts(){
  const q=(document.getElementById('listSearch')?.value||'').toLowerCase();
  return CONTACTS.filter(c=>{
    const chOk=currentChannel==='all'||c.channel===currentChannel;
    const qOk=!q||c.name.toLowerCase().includes(q)||c.company.toLowerCase().includes(q)||c.city.toLowerCase().includes(q);
    return chOk&&qOk;
  });
}

function renderList(){
  const contacts=filteredContacts();
  document.getElementById('listCount').textContent=contacts.length+' contacts';
  document.getElementById('contactList').innerHTML=contacts.map(c=>{
    const agingCls=daysSinceColor(c.daysSince);
    return`<div class="contact-card${selectedContact?.id===c.id?' selected':''}" onclick="selectContact('${c.id}')">
      <div class="cc-top">
        <div class="cc-avatar" style="background:${CHANNELS.find(ch=>ch.id===c.channel)?.color}22;color:${CHANNELS.find(ch=>ch.id===c.channel)?.color}">${c.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
        <div class="cc-info">
          <div class="cc-name">${c.name}</div>
          <div class="cc-company">${c.company}${c.city?` · ${c.city}`:''}</div>
        </div>
        <div class="cc-right">
          <div class="cc-ltv">${fmtMoney(c.ltv)}</div>
          <div class="cc-last">Last order ${c.lastOrder}</div>
        </div>
      </div>
      <div class="cc-tags">
        <span class="tag tag-${c.channel}">${CHANNELS.find(ch=>ch.id===c.channel)?.name||c.channel}</span>
        <span class="aging-flag ${agingCls}">⏱ ${daysSinceText(c.daysSince)}</span>
        ${c.status==='at-risk'?'<span class="aging-flag flag-amber">at risk</span>':''}
        ${c.status==='churned'?'<span class="aging-flag flag-red">churned</span>':''}
      </div>
    </div>`;
  }).join('');
}

function selectContact(id){
  selectedContact=CONTACTS.find(c=>c.id===id)||null;
  renderList();renderDetail();
}

function renderDetail(){
  const el=document.getElementById('detailPane');
  if(!selectedContact){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🍫</div><div class="empty-title">Select a contact</div><div class="empty-sub">Click any name to view their full profile, order history, and notes</div></div>`;
    return;
  }
  const c=selectedContact;
  const ch=CHANNELS.find(ch=>ch.id===c.channel)||{color:'#9e7455'};
  const totalOrders=c.orders.reduce((a,o)=>a+o.total,0);
  const avgOrder=c.orders.length?Math.round(totalOrders/c.orders.length):0;
  const maxUnits=Math.max(...(c.topProducts||[]).map(p=>p.units),1);

  el.innerHTML=`
  <div class="dp-head">
    <div class="dp-top">
      <div class="dp-avatar" style="background:${ch.color}22;color:${ch.color}">${c.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
      <div style="flex:1">
        <div class="dp-name">${c.name}</div>
        <div class="dp-company">${c.company}${c.role?` · ${c.role}`:''}</div>
        <div class="dp-contact-row">${c.email!=='—'?c.email:''}${c.phone!=='—'?` · ${c.phone}`:''} ${c.city?`· ${c.city}`:''}</div>
        <div class="dp-tags">
          <span class="tag tag-${c.channel}">${ch.name}</span>
          <span class="aging-flag ${daysSinceColor(c.daysSince)}">Last order: ${daysSinceText(c.daysSince)}</span>
          <span class="aging-flag ${daysSinceColor(c.daysContact)}">Last contact: ${daysSinceText(c.daysContact)}</span>
          ${c.status==='at-risk'?'<span class="aging-flag flag-amber">⚠ At risk</span>':''}
          ${c.status==='churned'?'<span class="aging-flag flag-red">⚠ Churned</span>':''}
          ${c.commissionPct>0?`<span class="aging-flag" style="background:rgba(154,112,212,.15);color:#9a70d4">${c.commissionPct}% commission</span>`:''}
        </div>
      </div>
    </div>
    <div class="dp-actions">
      <button class="btn btn-primary btn-sm">+ Log Activity</button>
      <button class="btn btn-sm">New Order</button>
      <button class="btn btn-sm">Send Email</button>
      <button class="btn btn-sm">Edit Contact</button>
    </div>
  </div>

  <div class="dp-body">
    <div class="dp-kpi-row">
      ${[
        {l:'Lifetime Value',v:fmtMoney(c.ltv),s:'all time'},
        {l:'Orders',v:c.orders.length,s:'on record'},
        {l:'Avg Order',v:fmtMoney(avgOrder),s:'per order'},
        {l:'Days Since Order',v:c.daysSince===0?'Today':c.daysSince+'d',s:c.daysSince>30?'⚠ Follow up':c.daysSince>0?'recent':'active today'},
      ].map(k=>`<div class="kpi-card"><div class="kpi-label">${k.l}</div><div class="kpi-val">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('')}
    </div>

    <div class="section-title">Top Products Purchased</div>
    <div class="card" style="margin-bottom:16px">
      ${(c.topProducts||[]).map((p,i)=>`<div class="top-prod-row">
        <div class="tp-rank">${i+1}</div>
        <div class="tp-name">${p.name}</div>
        <div class="tp-bar-wrap"><div class="tp-bar-track"><div class="tp-bar-fill" style="width:${Math.round(p.units/maxUnits*100)}%"></div></div></div>
        <div class="tp-units">${p.units} units</div>
        <div class="tp-val">${fmtMoney(p.val)}</div>
      </div>`).join('')}
    </div>

    <div class="section-title">Order History</div>
    <div class="card" style="margin-bottom:16px">
      <div class="order-row col-head-row">
        <span style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.7px">Date</span>
        <span style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.7px">Items</span>
        <span style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.7px;text-align:right">Total</span>
        <span style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.7px;text-align:right">Status</span>
        <span style="font-size:9px;color:var(--text-muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.7px;text-align:right">Channel</span>
      </div>
      ${c.orders.map(o=>`<div class="order-row">
        <div class="ord-date">${o.date}</div>
        <div class="ord-items">${o.items}</div>
        <div class="ord-total">${fmtMoney(o.total)}</div>
        <div class="ord-status"><span class="order-pill op-${o.status}">${o.status}</span></div>
        <div class="ord-ch">${o.channel}</div>
      </div>`).join('')}
    </div>

    ${c.commissions&&c.commissions.length?`
    <div class="section-title">Commission Tracking</div>
    <div class="card" style="margin-bottom:16px">
      ${c.commissions.map(cm=>`<div class="comm-row">
        <div class="comm-label">${cm.period}</div>
        <div class="comm-pct">${cm.pct}% rate</div>
        <div class="comm-pct">${fmtMoney(cm.sales)} in sales</div>
        <div class="comm-earned">${fmtMoney(cm.earned)}</div>
      </div>`).join('')}
    </div>`:''}

    <div class="section-title">Activity & Notes</div>
    <div class="card">
      ${c.notes.map(n=>`<div class="note-entry">
        <div class="note-meta">
          <span class="note-author">${n.author}</span>
          <span class="note-type nt-${n.type}">${n.type}</span>
          <span class="note-time">${n.time}</span>
        </div>
        <div class="note-text">${n.text}</div>
      </div>`).join('')}
      <div class="compose-row">
        <input class="compose-input" placeholder="Log a call, meeting, note, or email…">
        <button class="btn btn-sm btn-primary" onclick="alert('Activity logged!')">Log</button>
      </div>
    </div>
  </div>`;
}

function renderDashboard(){
  const el=document.getElementById('detailPane');
  const totalLtv=CONTACTS.reduce((a,c)=>a+c.ltv,0);
  const atRisk=CONTACTS.filter(c=>c.daysSince>30&&c.status!=='churned').length;
  const active=CONTACTS.filter(c=>c.status==='active').length;
  const byChannel=CHANNELS.slice(1).map(ch=>({...ch,rev:CONTACTS.filter(c=>c.channel===ch.id).reduce((a,c)=>a+c.ltv,0)}));
  el.innerHTML=`
  <div class="dash-kpi-row">
    ${[
      {l:'Total Accounts',v:CONTACTS.length,s:`${active} active`},
      {l:'Combined LTV',v:'$'+Math.round(totalLtv/1000)+'k',s:'all relationships'},
      {l:'Needs Follow-up',v:atRisk,s:'30+ days no order',warn:atRisk>0},
      {l:'Monthly Revenue',v:'$38.4k',s:'April 2026'},
    ].map(k=>`<div class="kpi-card${k.warn?' warn':''}"><div class="kpi-label">${k.l}</div><div class="kpi-val">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('')}
  </div>
  <div class="dashboard-grid">
    <div class="pipeline-col">
      <div class="pipeline-col-head"><div class="pipeline-col-title">By Channel — Revenue</div></div>
      ${byChannel.sort((a,b)=>b.rev-a.rev).map(ch=>{const maxRev=Math.max(...byChannel.map(c=>c.rev),1);return`
        <div class="pipeline-item" onclick="setChannel('${ch.id}');switchTab('contacts')">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <div><div class="pi-name">${ch.name}</div><div class="pi-company">${CONTACTS.filter(c=>c.channel===ch.id).length} accounts</div></div>
            <div class="pi-val">${fmtMoney(ch.rev)}</div>
          </div>
          <div style="height:4px;background:var(--cream-dark);border-radius:2px;overflow:hidden"><div style="height:100%;width:${Math.round(ch.rev/maxRev*100)}%;background:${ch.color};border-radius:2px"></div></div>
        </div>`;}).join('')}
    </div>
    <div class="pipeline-col">
      <div class="pipeline-col-head"><div class="pipeline-col-title">Follow-up Queue</div></div>
      ${CONTACTS.filter(c=>c.daysSince>14).sort((a,b)=>b.daysSince-a.daysSince).map(c=>`
        <div class="pipeline-item" onclick="selectContact('${c.id}');switchTab('contacts')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div><div class="pi-name">${c.name}</div><div class="pi-company">${c.company}</div></div>
            <div style="text-align:right"><div class="pi-val">${fmtMoney(c.ltv)}</div>
              <div class="aging-flag ${daysSinceColor(c.daysSince)}" style="font-size:9px;margin-top:3px">${c.daysSince}d since order</div>
            </div>
          </div>
        </div>`).join('')}
    </div>
    <div class="pipeline-col">
      <div class="pipeline-col-head"><div class="pipeline-col-title">Recent Orders</div></div>
      ${CONTACTS.flatMap(c=>c.orders.map(o=>({...o,contact:c.name,company:c.company}))).slice(0,8).map(o=>`
        <div class="pipeline-item">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><div class="pi-name">${o.contact}</div><div class="pi-company">${o.company}</div></div>
            <div style="text-align:right"><div class="pi-val">${fmtMoney(o.total)}</div><span class="order-pill op-${o.status}" style="font-size:8px">${o.status}</span></div>
          </div>
        </div>`).join('')}
    </div>
    <div class="pipeline-col">
      <div class="pipeline-col-head"><div class="pipeline-col-title">Affiliate Commissions</div></div>
      ${CONTACTS.filter(c=>c.commissionPct>0).map(c=>`
        <div class="pipeline-item" onclick="selectContact('${c.id}');switchTab('contacts')">
          <div style="display:flex;justify-content:space-between">
            <div><div class="pi-name">${c.name}</div><div class="pi-company">${c.company}</div></div>
            <div style="text-align:right"><div class="pi-val">${c.commissionPct}% commission</div>
              <div class="pi-company">LTV ${fmtMoney(c.ltv)}</div></div>
          </div>
        </div>`).join('')}
      <div class="pipeline-item" style="text-align:center;color:var(--text-muted);font-size:12px;padding:16px">
        + Add affiliate partner
      </div>
    </div>
  </div>`;
}

// init
renderSidebar();
